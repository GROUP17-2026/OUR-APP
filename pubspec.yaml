name: campusconnect
description: CampusConnect — a Flutter Android app for university students.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1

  flutter_riverpod: ^2.5.1
  go_router: ^14.3.0

  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  lottie: ^3.1.2
  cached_network_image: ^3.4.0

  flutter_local_notifications: ^17.2.2

  file_picker: ^8.1.2
  path_provider: ^2.1.4

  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.5.0
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1
  table_calendar: ^3.1.2
  url_launcher: ^6.3.1
  add_2_calendar: ^3.0.1
  open_file: ^3.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0D0D1A"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
